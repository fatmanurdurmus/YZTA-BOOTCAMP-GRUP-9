services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: carbonpilot
      POSTGRES_USER: carbonpilot
      POSTGRES_PASSWORD: carbonpilot
    ports:
      - "5432:5432"
    volumes:
      - carbonpilot_pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://carbonpilot:carbonpilot@postgres:5432/carbonpilot
      LANGSMITH_TRACING: "false"
      PYTHONPATH: "/app"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  carbonpilot_pgdata: